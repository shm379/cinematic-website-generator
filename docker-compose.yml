# Cinemate — Docker Compose (Coolify-aware)
#
# Coolify (recommended):
#   New Resource → this Git repo → Build Pack: "Docker Compose".
#   The magic env var SERVICE_FQDN_WEB_3000 tells Coolify to generate a domain
#   and route its proxy (Traefik/Caddy) over the internal network to the
#   EXPOSED port 3000 of the `web` service. This is what makes traffic reach
#   the container — WITHOUT publishing a host port.
#   To use your own domain set SERVICE_FQDN_WEB_3000=https://your-domain.com
#   in Coolify's environment variables (or leave it empty to auto-generate).
#
#   IMPORTANT: do NOT add a `ports:` host mapping here. Coolify already binds
#   :80/:443 (and may reuse :3000); publishing the host port causes
#   "Bind for 0.0.0.0:3000 failed: port is already allocated".
#
# Local testing:
#   Option A (no compose):  docker build -t cinemate . && docker run -p 3000:3000 cinemate
#   Option B (compose):     uncomment the `ports:` block below, then `docker compose up -d`

services:
  web:
    build: .
    image: cinemate
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # server.js binds exactly to this port on 0.0.0.0.
      - PORT=3000
      # Coolify magic var → generates an FQDN and proxies it to web:3000.
      - SERVICE_FQDN_WEB_3000
      # Optional AI keys — set these in Coolify (passed through from the host
      # env). Without them the app still works (image gen disabled; mega-prompt
      # uses the keyless heuristic parser).
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    # Coolify's proxy routes to this exposed container port over the Docker
    # network (no host binding needed).
    expose:
      - "3000"
    # --- Local only: uncomment to reach the app on http://localhost:3000 ---
    # ports:
    #   - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 8s
