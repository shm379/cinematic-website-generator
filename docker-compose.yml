# Cinemate — Docker Compose (also Coolify-compatible)
#
# Local:   docker compose up -d   → http://localhost:3000
# Coolify: create a resource from this repo, pick "Docker Compose" (or
#          "Dockerfile"), set the port to 3000, and deploy. Coolify handles
#          the domain, SSL and reverse proxy for you.

services:
  web:
    build: .
    image: cinemate
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 8s
